<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智能对话智能体</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">LangChain · Qwen · Chroma · FastAPI</p>
      <h1>智能对话智能体</h1>
      <p class="hero-copy">一个用于 RAG 知识库问答的最小应用骨架，当前首页只保留聊天体验。</p>
      <a class="temp-entry" href="/admin/rag">RAG 管理（临时）</a>
    </section>

    <section class="workspace" aria-label="对话机器人工作区">
      <article class="panel chat-panel">
        <div class="panel-header">
          <div>
            <p class="label">对话机器人</p>
            <h2>Chat Console</h2>
          </div>
          <span class="status-dot">在线</span>
        </div>

        <div id="chatMessages" class="chat-messages" aria-live="polite">
          <div class="message bot">
            <span class="message-role">Bot</span>
            <p>你好，我是你的 RAG 对话智能体。请直接发送问题，我会先用占位回复承接后续能力。</p>
          </div>
        </div>

        <form id="chatForm" class="chat-form">
          <label class="sr-only" for="messageInput">输入消息</label>
          <input id="messageInput" name="message" type="text" placeholder="输入你的问题，例如：总结知识库内容" autocomplete="off" required>
          <button type="submit">发送</button>
        </form>
      </article>
    </section>
  </main>

  <script src="/static/chat.js"></script>
</body>
</html>
