<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智能对话智能体</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">LangChain · Qwen · Chroma · FastAPI</p>
      <h1>智能对话智能体</h1>
      <p class="hero-copy">一个用于 RAG 知识库问答的最小应用骨架，当前首页只保留聊天体验。</p>
      <a class="temp-entry" href="/admin/rag">RAG 管理（临时）</a>
      <a class="temp-entry" href="/admin/faq">FAQ 管理（临时）</a>
    </section>

    <section class="workspace" aria-label="对话机器人工作区">
      <article class="panel chat-panel">
        <div class="panel-header">
          <div>
            <p class="label">对话机器人</p>
            <h2>Chat Console</h2>
          </div>
          <span class="status-dot">在线</span>
        </div>

        <div class="chat-toolbar" aria-label="会话管理">
          <div class="session-control">
            <span class="toolbar-kicker">当前会话</span>
            <div class="session-row">
              <select id="sessionSelect" aria-label="选择会话"></select>
              <strong id="sessionLabel">载入中</strong>
            </div>
          </div>
          <div class="toolbar-actions">
            <button id="newSessionButton" class="ghost-button" type="button">新会话</button>
            <button id="deleteSessionButton" class="ghost-button danger-button" type="button">删除会话</button>
            <button id="clearChatButton" class="ghost-button" type="button">清空显示</button>
          </div>
        </div>

        <div id="chatMessages" class="chat-messages" aria-live="polite"></div>

        <div id="agentStatus" class="agent-status" aria-live="polite" hidden>
          <span class="agent-status-dot" aria-hidden="true"></span>
          <span id="agentStatusText">模型正在思考...</span>
        </div>

        <form id="chatForm" class="chat-form">
          <label class="sr-only" for="messageInput">输入消息</label>
          <input id="messageInput" name="message" type="text" placeholder="输入你的问题，例如：总结知识库内容" autocomplete="off" required>
          <button id="sendButton" type="submit">发送</button>
        </form>
      </article>
    </section>
  </main>

  <script src="/static/chat.js"></script>
</body>
</html>
