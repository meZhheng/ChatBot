<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAG 管理</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Admin · RAG</p>
      <h1>RAG 管理</h1>
      <p class="hero-copy">这是专门给开发和调试使用的管理页，用于查看 chunks 与知识库状态。</p>
      <a class="temp-entry" href="/">返回聊天页</a>
    </section>

    <section class="workspace" aria-label="RAG 管理工作区">
      <aside class="panel knowledge-panel">
        <div class="panel-header">
          <div>
            <p class="label">RAG 知识库</p>
            <h2>Knowledge Base</h2>
          </div>
        </div>

        <p class="knowledge-copy">此页面用于管理知识库调试工具，不会出现在普通用户首页。</p>

        <section class="chunks-panel" aria-labelledby="chunksTitle">
          <div class="chunks-panel-header">
            <div>
              <p class="label">向量数据库</p>
              <h2 id="chunksTitle">当前 chunks</h2>
            </div>
            <button id="refreshChunksButton" type="button">刷新</button>
          </div>

          <p id="chunksStatus" class="chunks-status">页面加载后自动读取 Chroma 中的 chunks。</p>
          <div id="chunksList" class="chunks-list" aria-live="polite"></div>
        </section>

        <section class="retrieve-panel" aria-labelledby="retrieveTitle">
          <div class="panel-header retrieve-panel-header">
            <div>
              <p class="label">检索测试</p>
              <h2 id="retrieveTitle">Retrieve Test</h2>
            </div>
          </div>

          <form id="retrieveForm" class="retrieve-form">
            <label for="queryInput">query</label>
            <textarea id="queryInput" name="query" rows="4" placeholder="输入要检索的问题" required></textarea>

            <label for="topKInput">top_k</label>
            <input id="topKInput" name="top_k" type="number" min="1" value="5" required>

            <button type="submit">Run Retrieve</button>
          </form>

          <p id="retrieveStatus" class="retrieve-status">输入 query 和 top_k 以测试检索。</p>
          <div id="retrieveResults" class="retrieve-results" aria-live="polite"></div>
        </section>
      </aside>
    </section>
  </main>

  <script src="/static/admin_rag.js"></script>
</body>
</html>
